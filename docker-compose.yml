version: '3.8'

services:
  dragonscale-agent:
    build: .
    container_name: dragonscale-node
    environment:
      - DRAGONSCALE_NODE_ID=${DRAGONSCALE_NODE_ID:-auto}
      - POSTGRES_URL=postgresql://dragonscale:dragonscale@postgres:5432/dragonscale
    volumes:
      - ./config:/app/config
      - ./ledger:/app/ledger
      - ${AUTHORIZED_FOLDERS:-/data}:/app/user_data:ro  # read-only for profile learning
    depends_on:
      - postgres
    ports:
      - "8080:8080"  # future UI
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: dragonscale
      POSTGRES_USER: dragonscale
      POSTGRES_PASSWORD: dragonscale
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # Optional: pgvector + temporal extensions (uncomment for full graph)
  # vector-db:
  #   image: pgvector/pgvector:pg16
  #   ...

volumes:
  postgres_data: